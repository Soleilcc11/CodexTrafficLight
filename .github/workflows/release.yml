name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如 1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build app
        run: bash build.sh

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Create DMG
        run: |
          hdiutil create -volname "ClaudeTrafficLight" \
            -srcfolder dist/ClaudeTrafficLight.app \
            -ov -format UDZO \
            dist/ClaudeTrafficLight-${{ steps.version.outputs.version }}.dmg

      - name: Zip app
        run: cd dist && zip -r ClaudeTrafficLight.app.zip ClaudeTrafficLight.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeTrafficLight-${{ steps.version.outputs.version }}
          path: |
            dist/ClaudeTrafficLight.app.zip
            dist/ClaudeTrafficLight-${{ steps.version.outputs.version }}.dmg

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ClaudeTrafficLight-${{ needs.build.outputs.version }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Claude Code Traffic Light v${{ needs.build.outputs.version }}
          body: |
            ## Claude Code Traffic Light v${{ needs.build.outputs.version }}

            ### 安装说明

            **方式一：直接下载 .app**
            1. 下载 `ClaudeTrafficLight.app.zip`
            2. 解压后将 `ClaudeTrafficLight.app` 拖入 Applications 文件夹
            3. 双击启动

            **方式二：下载 DMG 安装包**
            1. 下载 `ClaudeTrafficLight-${{ needs.build.outputs.version }}.dmg`
            2. 双击打开 DMG，将应用拖入 Applications 文件夹
            3. 启动应用

            ### 功能特性

            - 🟢 绿灯常亮 — 会话进行中
            - 🟡 黄灯闪烁 — 需要确认
            - 🔴 红灯常亮 — 会话结束
            - 多项目支持
            - 自动配置 Claude Code hooks

            ### 系统要求

            - macOS 10.15+

            ### ⚠️ macOS 安全提示（"无法验证开发者"）

            首次打开时，macOS 可能会弹出 **"无法验证开发者"** 或 **"Apple 无法检查是否包含恶意软件"** 的提示，这是正常的——因为此应用未经 Apple 公证（Notarization）。

            **解决方法：**

            1. 在「系统设置 → 隐私与安全性」底部，点击 **"仍要打开"**
            2. 或者右键点击应用 → 选择 **"打开"**，再次弹窗时点击 **"打开"**
            3. 如果以上都不行，打开终端执行：
               ```bash
               xattr -cr /Applications/ClaudeTrafficLight.app
               ```
               然后正常双击打开即可。
          files: |
            ClaudeTrafficLight.app.zip
            ClaudeTrafficLight-${{ needs.build.outputs.version }}.dmg
          draft: false
          prerelease: false
